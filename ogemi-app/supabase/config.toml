# Configuración del proyecto Supabase CLI
# Referencia: https://supabase.com/docs/reference/cli/config
#
# Para usar el CLI localmente:
#   1. Instalar: brew install supabase/tap/supabase
#   2. Login:    supabase login
#   3. Link:     supabase link --project-ref tnuzaaetfbbnxtbedlhs
#   4. Pull:     supabase db pull  (sincroniza schema remoto → local)

project_id = "tnuzaaetfbbnxtbedlhs"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[auth.email.template.invite]
subject = "Ogemi te está invitando"
content_path = "./supabase/templates/invite.html"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083
